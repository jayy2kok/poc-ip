spring:
    application:
        name: payment-processing-system

    profiles:
        active: sol1

    datasource:
        url: jdbc:postgresql://localhost:5432/instantpayments
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true

    artemis:
        mode: native
        broker-url: tcp://localhost:61616
        user: admin
        password: admin

    jackson:
        serialization:
            write-dates-as-timestamps: false

server:
    port: 8081

# Sol2 config — only used when spring.profiles.active=sol2
pps:
    broker-system:
        url: http://localhost:8082

logging:
    level:
        com.instantpayments.pps: DEBUG

springdoc:
    swagger-ui:
        url: /openapi/pps-api.yaml
