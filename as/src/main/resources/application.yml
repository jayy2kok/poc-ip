spring:
    application:
        name: audit-service

    datasource:
        url: jdbc:postgresql://localhost:5432/instantpayments
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true

    jackson:
        serialization:
            write-dates-as-timestamps: false

server:
    port: 8084

logging:
    level:
        com.instantpayments.as: DEBUG

springdoc:
    swagger-ui:
        url: /openapi/as-api.yaml
